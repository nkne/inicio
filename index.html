    <title>mis marcadores</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1e24;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Buscador de Google */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #232931;
            border: 1px solid #393e46;
            border-radius: 24px;
            padding: 0 15px;
            height: 48px;
            transition: background 0.2s, border-color 0.2s;
        }

        .search-box:focus-within {
            background: #2a323d;
            border-color: #4b5563;
        }

        .search-box form {
            display: flex;
            width: 100%;
            align-items: center;
        }

        .search-box input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 0 10px;
        }

        .search-box button {
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Grilla de Marcadores */
        .grid-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        .shortcut-card {
            background-color: #232931;
            border: 1px solid #2e3641;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #e5e7eb;
            transition: background-color 0.2s, transform 0.2s, border-color 0.2s;
            padding: 10px;
            text-align: center;
        }

        .shortcut-card:hover {
            background-color: #2a323d;
            border-color: #4b5563;
            transform: translateY(-2px);
        }

        .shortcut-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
            border-radius: 6px;
            object-fit: contain;
        }

        .shortcut-name {
            font-size: 13px;
            font-weight: 500;
            word-break: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
    </style>
</head>

                </button>
